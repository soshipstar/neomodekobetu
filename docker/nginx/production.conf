upstream frontend {
    server frontend:3000;
}

upstream backend {
    server backend:8000;
}

# HTTP -> HTTPS redirect + certbot challenge
server {
    listen 80;
    server_name kiduri.xyz;
    client_max_body_size 20M;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS
server {
    listen 443 ssl;
    server_name kiduri.xyz;
    client_max_body_size 20M;

    ssl_certificate /etc/letsencrypt/live/kiduri.xyz/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/kiduri.xyz/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # HP 埋め込みウィジェット (iframe で外部 HP から参照される)
    # ・server レベルの X-Frame-Options "SAMEORIGIN" を継承すると外部 HP の
    #   iframe で表示できないため、この location ブロックで意図的に
    #   X-Frame-Options をクリアする必要がある。
    # ・nginx の add_header 継承ルールは「always 付きの inheritance に
    #   バグ/挙動差があり」確実ではないため、明示的に「全 add_header を
    #   override」してから X-Frame-Options だけ抜く方式にする。
    # ・代わりに CSP frame-ancestors * は Laravel 側でレスポンスに付与する。
    # ・iframe を任意の外部ホストから読み込めるよう、CSP を nginx でも上書き。
    location ^~ /api/widget/ {
        proxy_pass http://backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
        proxy_send_timeout 30s;

        # upstream (Laravel) が出した X-Frame-Options は問答無用で隠す
        proxy_hide_header X-Frame-Options;
        # 念のため Set-Cookie も外して認証セッションが iframe 上で漏れないようにする
        proxy_hide_header Set-Cookie;

        # nginx 側で server-level の add_header を継承しないよう、ここで全てを上書き宣言する。
        # X-Frame-Options は意図的に含めない。
        add_header X-Content-Type-Options "nosniff" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header Content-Security-Policy "frame-ancestors *;" always;
        # 念のため iframe 用に X-Frame-Options を ALLOWALL で明示
        # (古いブラウザ向け。Chrome/Safari は CSP frame-ancestors を優先)
        add_header X-Frame-Options "ALLOWALL" always;
    }

    # API requests -> Laravel
    location /api {
        proxy_pass http://backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }

    # Sanctum CSRF cookie
    location /sanctum {
        proxy_pass http://backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # WebSocket -> Reverb (dynamic resolution to handle service being down)
    # /app/ (末尾スラッシュ) にすることで /apple-touch-icon.png など /app で
    # 始まる他のパスに誤ってマッチしないようにする。
    resolver 127.0.0.11 valid=10s;
    location /app/ {
        set $reverb_upstream reverb:8080;
        proxy_pass http://$reverb_upstream;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }

    # Broadcasting auth -> Laravel
    location /broadcasting {
        proxy_pass http://backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Storage files
    location /storage {
        proxy_pass http://backend;
        proxy_set_header Host $host;
    }

    # Everything else -> Next.js
    location / {
        proxy_pass http://frontend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# ============================================
# kirakiramap.xyz -> kirarin (shared-proxy)
# ============================================

# HTTP: certbot challenge + redirect
server {
    listen 80;
    server_name kirakiramap.xyz www.kirakiramap.xyz;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS
server {
    listen 443 ssl;
    server_name kirakiramap.xyz www.kirakiramap.xyz;
    client_max_body_size 12M;

    ssl_certificate /etc/letsencrypt/live/kirakiramap.xyz/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/kirakiramap.xyz/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    location / {
        proxy_pass http://kirarin-nginx:80;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }
}
