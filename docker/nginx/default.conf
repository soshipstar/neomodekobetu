# compose 内 nginx 設定
#
# 重要: upstream { server backend:8000; } の形式は nginx 起動時に DNS を 1 度だけ解決して
#       IP をキャッシュする。Docker でコンテナを再起動すると新しい IP が割り当てられるが
#       nginx は古い IP に接続し続け、502 / Connection refused が発生する (過去事例あり)。
#
# 解決策: Docker 内蔵 DNS (127.0.0.11) を resolver に指定し、proxy_pass を変数化する。
#         変数版の proxy_pass は「リクエストごとに DNS 再解決」する仕様なので、
#         backend / frontend / reverb のいずれを再起動しても nginx 側を再起動せずに追従できる。
#         valid=10s で 10 秒間 DNS をキャッシュし、過剰な DNS lookup を回避する。

server {
    listen 80;
    server_name localhost;
    client_max_body_size 20M;

    # Docker 内蔵 DNS。コンテナ起動時に常に 127.0.0.11:53 で利用可能。
    # valid=10s でキャッシュ時間を 10 秒に制限 → コンテナ再起動から最大 10 秒で復帰。
    resolver 127.0.0.11 valid=10s ipv6=off;
    resolver_timeout 5s;

    # API requests -> Laravel backend (変数化により再起動追従)
    location /api {
        set $upstream_backend "backend:8000";
        proxy_pass http://$upstream_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Sanctum CSRF cookie
    location /sanctum {
        set $upstream_backend "backend:8000";
        proxy_pass http://$upstream_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # WebSocket -> Reverb (変数化により再起動追従)
    # 注意: location /app だと /apple-touch-icon.png 等が誤マッチするため、
    # 末尾スラッシュ付きの /app/ にして prefix match を厳密化する。
    # (Pusher プロトコルの URL は /app/{app_key} なので /app/ で十分マッチする)
    location /app/ {
        set $upstream_reverb "reverb:8080";
        proxy_pass http://$upstream_reverb;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }

    # Storage files (backend が serve)
    location /storage {
        set $upstream_backend "backend:8000";
        proxy_pass http://$upstream_backend;
        proxy_set_header Host $host;
    }

    # Everything else -> Next.js frontend (変数化により再起動追従)
    location / {
        set $upstream_frontend "frontend:3000";
        proxy_pass http://$upstream_frontend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Next.js HMR WebSocket
    location /_next/webpack-hmr {
        set $upstream_frontend "frontend:3000";
        proxy_pass http://$upstream_frontend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
