services:
  # --- Frontend (Next.js 16 - Production Build) ---
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
    restart: always
    mem_limit: 512m
    memswap_limit: 768m
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_API_URL=https://kiduri.xyz/api
      - NEXT_PUBLIC_BACKEND_URL=https://kiduri.xyz
      - NEXT_PUBLIC_REVERB_APP_KEY=kiduri-reverb-key
      - NEXT_PUBLIC_REVERB_HOST=kiduri.xyz
      - NEXT_PUBLIC_REVERB_PORT=443
      - NEXT_PUBLIC_REVERB_SCHEME=https
    depends_on:
      - backend

  # --- Backend (Laravel 12) ---
  backend:
    build:
      context: .
      dockerfile: docker/php/Dockerfile.prod
    restart: always
    mem_limit: 512m
    memswap_limit: 768m
    environment:
      - APP_ENV=production
      - APP_DEBUG=false
      - APP_URL=https://kiduri.xyz
      - FRONTEND_URL=https://kiduri.xyz
      - SESSION_DOMAIN=kiduri.xyz
      - SANCTUM_STATEFUL_DOMAINS=kiduri.xyz,www.kiduri.xyz
      - CORS_ALLOWED_ORIGINS=https://kiduri.xyz
    volumes:
      - storage_data:/var/www/html/storage
      - ./backend/.env:/var/www/html/.env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # --- WebSocket (Laravel Reverb) ---
  reverb:
    build:
      context: .
      dockerfile: docker/php/Dockerfile.prod
    restart: always
    mem_limit: 128m
    memswap_limit: 256m
    command: php artisan reverb:start --host=0.0.0.0 --port=8080
    environment:
      - APP_ENV=production
      - APP_DEBUG=false
      - APP_URL=https://kiduri.xyz
      - REVERB_HOST=0.0.0.0
      - REVERB_PORT=8080
      - REVERB_SCHEME=http
    volumes:
      - ./backend/.env:/var/www/html/.env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # --- Queue Worker ---
  queue:
    build:
      context: .
      dockerfile: docker/php/Dockerfile.prod
    restart: always
    mem_limit: 256m
    memswap_limit: 384m
    command: php artisan queue:work redis --tries=3 --timeout=90
    environment:
      - APP_ENV=production
      - APP_DEBUG=false
      - APP_URL=https://kiduri.xyz
      - FRONTEND_URL=https://kiduri.xyz
    volumes:
      - storage_data:/var/www/html/storage
      - ./backend/.env:/var/www/html/.env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # --- Task Scheduler ---
  scheduler:
    build:
      context: .
      dockerfile: docker/php/Dockerfile.prod
    restart: always
    mem_limit: 128m
    memswap_limit: 256m
    command: php artisan schedule:work
    environment:
      - APP_ENV=production
      - APP_DEBUG=false
      - APP_URL=https://kiduri.xyz
      - FRONTEND_URL=https://kiduri.xyz
    volumes:
      - storage_data:/var/www/html/storage
      - ./backend/.env:/var/www/html/.env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # --- PostgreSQL 16 + pgvector ---
  postgres:
    image: pgvector/pgvector:pg16
    restart: always
    mem_limit: 512m
    memswap_limit: 768m
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/01_init.sql
    environment:
      - POSTGRES_DB=kiduri
      - POSTGRES_USER=kiduri
      - POSTGRES_PASSWORD=${DB_PASSWORD:-kiduri_secret}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kiduri"]
      interval: 10s
      timeout: 5s
      retries: 5

  # --- Redis 7 ---
  redis:
    image: redis:7-alpine
    restart: always
    mem_limit: 128m
    memswap_limit: 192m
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # --- Python Analytics Engine ---
  analytics:
    build:
      context: ./analytics
      dockerfile: Dockerfile
    restart: always
    mem_limit: 256m
    memswap_limit: 384m
    environment:
      - DATABASE_URL=postgresql://kiduri:${DB_PASSWORD:-kiduri_secret}@postgres:5432/kiduri
    depends_on:
      postgres:
        condition: service_healthy

  # --- Nginx Reverse Proxy + SSL ---
  nginx:
    image: nginx:alpine
    restart: always
    mem_limit: 64m
    memswap_limit: 128m
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx/production.conf:/etc/nginx/conf.d/default.conf
      - certbot_webroot:/var/www/certbot
      - certbot_certs:/etc/letsencrypt
    depends_on:
      - frontend
      - backend
    networks:
      - default
      - shared-proxy

  # --- Certbot (SSL) ---
  certbot:
    image: certbot/certbot
    volumes:
      - certbot_webroot:/var/www/certbot
      - certbot_certs:/etc/letsencrypt

volumes:
  postgres_data:
  redis_data:
  storage_data:
  certbot_webroot:
  certbot_certs:

networks:
  default:
    name: kiduri2026_default
  shared-proxy:
    external: true
