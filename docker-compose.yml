services:
  # --- Frontend (Next.js 16) ---
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost/api
      - NEXT_PUBLIC_WS_HOST=localhost
      - NEXT_PUBLIC_WS_PORT=80
      - WATCHPACK_POLLING=true
    depends_on:
      - backend

  # --- Backend (Laravel 12) ---
  backend:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/var/www/html
    environment:
      - APP_NAME=Kiduri
      - APP_ENV=local
      - APP_DEBUG=true
      - APP_URL=http://localhost
      - DB_CONNECTION=pgsql
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_DATABASE=kiduri
      - DB_USERNAME=kiduri
      - DB_PASSWORD=kiduri_secret
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - CACHE_STORE=redis
      - SESSION_DRIVER=redis
      - QUEUE_CONNECTION=redis
      - REVERB_APP_ID=kiduri
      - REVERB_APP_KEY=kiduri-key
      - REVERB_APP_SECRET=kiduri-secret
      - REVERB_HOST=0.0.0.0
      - REVERB_PORT=8080
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # --- WebSocket (Laravel Reverb) ---
  reverb:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    command: php artisan reverb:start --host=0.0.0.0 --port=8080
    ports:
      - "8080:8080"
    volumes:
      - ./backend:/var/www/html
    environment:
      - APP_ENV=local
      - DB_CONNECTION=pgsql
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_DATABASE=kiduri
      - DB_USERNAME=kiduri
      - DB_PASSWORD=kiduri_secret
      - REDIS_HOST=redis
      - REVERB_APP_ID=kiduri
      - REVERB_APP_KEY=kiduri-key
      - REVERB_APP_SECRET=kiduri-secret
      - REVERB_HOST=0.0.0.0
      - REVERB_PORT=8080
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # --- Queue Worker ---
  queue:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    command: php artisan queue:work redis --tries=3 --timeout=90
    volumes:
      - ./backend:/var/www/html
    environment:
      - APP_ENV=local
      - DB_CONNECTION=pgsql
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_DATABASE=kiduri
      - DB_USERNAME=kiduri
      - DB_PASSWORD=kiduri_secret
      - REDIS_HOST=redis
      - QUEUE_CONNECTION=redis
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # --- Task Scheduler ---
  scheduler:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    command: php artisan schedule:work
    volumes:
      - ./backend:/var/www/html
    environment:
      - APP_ENV=local
      - DB_CONNECTION=pgsql
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_DATABASE=kiduri
      - DB_USERNAME=kiduri
      - DB_PASSWORD=kiduri_secret
      - REDIS_HOST=redis
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # --- PostgreSQL 16 + pgvector ---
  postgres:
    image: pgvector/pgvector:pg16
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/01_init.sql
    environment:
      - POSTGRES_DB=kiduri
      - POSTGRES_USER=kiduri
      - POSTGRES_PASSWORD=kiduri_secret
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kiduri"]
      interval: 5s
      timeout: 5s
      retries: 5

  # --- Redis 7 ---
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # --- Python Analytics Engine ---
  analytics:
    build:
      context: ./analytics
      dockerfile: Dockerfile
    ports:
      - "8001:8001"
    volumes:
      - ./analytics:/app
    environment:
      - DATABASE_URL=postgresql://kiduri:kiduri_secret@postgres:5432/kiduri
    depends_on:
      postgres:
        condition: service_healthy

  # --- Nginx Reverse Proxy ---
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - frontend
      - backend

volumes:
  postgres_data:
  redis_data:
